<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Manager</title>

<style>
:root {
  --bg:#0b0b0c;
  --card:#161618;
  --accent:#d4af37;
  --neon:#00ffcc;
  --text:#f5f5f5;
  --muted:#888;
}

* {box-sizing:border-box; font-family:system-ui;}
body {
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  padding:16px;
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
}

/* SEARCH */
.search-bar {
  padding:10px;
}
.search-bar input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1f1f22;
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:12px;
}

.card {
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  transition:.3s;
}
.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-content {
  padding:10px;
}

.tag {
  display:inline-block;
  background:rgba(212,175,55,0.2);
  color:var(--accent);
  padding:2px 6px;
  margin:2px;
  border-radius:8px;
  font-size:10px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,var(--accent),var(--neon));
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  color:black;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:var(--card);
  padding:16px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

input, textarea {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:black;
  width:100%;
  margin-top:5px;
}

/* ANIMATION */
.fade-in {
  animation:fade .3s ease;
}
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<header>
  🚗 Garage Manager
  <span id="count"></span>
</header>

<div class="search-bar">
  <input id="search" placeholder="Search cars...">
</div>

<div class="grid" id="grid"></div>

<button class="fab" onclick="openForm()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content fade-in">
    <h3 id="formTitle">Add Car</h3>
    <input id="name" placeholder="Name">
    <input id="garage" placeholder="Garage">
    <input id="tags" placeholder="Tags (comma)">
    <textarea id="notes" placeholder="Notes"></textarea>
    <input type="file" id="image">

    <button onclick="saveCar()">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars") || "[]");
let editIndex = null;

function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  let filtered = cars.filter(c =>
    c.name.toLowerCase().includes(search) ||
    c.garage.toLowerCase().includes(search) ||
    c.tags.toLowerCase().includes(search) ||
    c.notes.toLowerCase().includes(search)
  );

  document.getElementById("count").innerText = filtered.length;

  filtered.forEach((c,i)=>{
    let card = document.createElement("div");
    card.className="card fade-in";

    card.innerHTML = `
      <img src="${c.image || 'https://via.placeholder.com/300x200'}">
      <div class="card-content">
        <b>${c.name}</b><br>
        <small>${c.garage}</small><br>
        ${c.tags.split(",").map(t=>`<span class="tag">${t}</span>`).join("")}
      </div>
    `;

    card.onclick = ()=>editCar(i);
    grid.appendChild(card);
  });

  localStorage.setItem("cars", JSON.stringify(cars));
}

function openForm() {
  document.getElementById("modal").style.display="flex";
  document.getElementById("formTitle").innerText="Add Car";
  editIndex=null;
}

function closeForm() {
  document.getElementById("modal").style.display="none";
}

function saveCar() {
  let name = document.getElementById("name").value;
  let garage = document.getElementById("garage").value;
  let tags = document.getElementById("tags").value;
  let notes = document.getElementById("notes").value;
  let file = document.getElementById("image").files[0];

  if(file) {
    let reader = new FileReader();
    reader.onload = ()=>{
      store(reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    store(null);
  }

  function store(img) {
    let car = {name,garage,tags,notes,image:img};

    if(editIndex!==null) cars[editIndex]=car;
    else cars.push(car);

    closeForm();
    render();
  }
}

function editCar(i) {
  let c = cars[i];
  editIndex=i;

  document.getElementById("modal").style.display="flex";
  document.getElementById("formTitle").innerText="Edit Car";

  name.value=c.name;
  garage.value=c.garage;
  tags.value=c.tags;
  notes.value=c.notes;
}

document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
