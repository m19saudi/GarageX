<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE // ULTIMATE GARAGE</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --gold: #ffcc00;
            --danger: #ff3e3e;
            --text-main: #ffffff;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.1);
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Impact, sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); overflow: hidden; height: 100%; width: 100%; }

        /* CINEMATIC EFFECTS */
        .v-bg-glow { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vw; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); transform: translate(-50%, -50%); opacity: 0.1; z-index: -1; pointer-events: none; }
        
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000; opacity: 0.3;
        }

        .hud-container { display: flex; flex-direction: column; height: 100vh; padding: 30px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }

        /* HEADER & NAV */
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .brand { letter-spacing: 5px; font-weight: 900; font-style: italic; font-size: 1.4rem; text-shadow: 0 0 10px var(--accent-glow); }
        .brand span { color: var(--accent); }

        nav { display: flex; gap: 25px; }
        .nav-item { cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: bold; color: var(--text-dim); transition: var(--transition); letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -16px; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* SCREEN LOGIC */
        .screen { display: none; flex: 1; overflow-y: auto; padding-right: 10px; animation: slideUp 0.6s ease; }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* GARAGE GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .card { background: var(--panel); border: 1px solid var(--border); position: relative; overflow: hidden; height: 180px; cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); box-shadow: 0 0 20px var(--accent-glow); }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .card:hover .card-img { opacity: 0.8; }
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); border-top: 1px solid rgba(0, 242, 255, 0.2); }
        .card-name { font-weight: 900; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        .card-meta { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* MAP/NETWORK SCREEN */
        .map-container { height: 450px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); position: relative; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .map-node { position: absolute; width: 50px; height: 50px; border: 1px solid var(--accent); background: rgba(0, 242, 255, 0.1); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .map-node:hover, .map-node.active { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .overlay.active { display: flex; }
        .sheet { background: #080808; width: 90%; max-width: 450px; border: 1px solid var(--accent); position: relative; padding: 40px; box-shadow: 0 0 50px rgba(0,0,0,1); animation: modalIn 0.4s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        input, select { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 20px; outline: none; font-size: 14px; letter-spacing: 1px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .btn { background: var(--accent); color: black; border: none; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; letter-spacing: 2px; font-size: 12px; }
        .btn:hover { letter-spacing: 4px; box-shadow: 0 0 20px var(--accent); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 15px; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* STATS */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 25px; border-left: 5px solid var(--accent); }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 10px; letter-spacing: 2px; }

        .fab { position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 35px; cursor: pointer; box-shadow: 0 0 30px var(--accent-glow); z-index: 100; transition: 0.3s; }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>
    <div class="v-bg-glow"></div>
    
    <div class="hud-container">
        <header>
            <div class="brand">V-CORE // <span>GLOBAL</span></div>
            <nav id="mainNav">
                <div class="nav-item active" onclick="switchTab('garage', this)">GARAGE</div>
                <div class="nav-item" onclick="switchTab('network', this)">NETWORK</div>
                <div class="nav-item" onclick="switchTab('data', this)">DATA</div>
            </nav>
        </header>

        <div id="screen-garage" class="screen active">
            <input type="text" id="search" placeholder="SEARCH DATABASE..." oninput="render()" style="background: transparent; border: none; border-bottom: 1px solid var(--border); padding-left: 0; font-size: 18px; margin-bottom: 30px;">
            <div id="grid" class="grid"></div>
        </div>

        <div id="screen-network" class="screen">
            <div class="map-container">
                <div class="map-node" style="top:20%; left:20%" onclick="filterZone('North Zone', this)">N-01</div>
                <div class="map-node" style="top:40%; left:70%" onclick="filterZone('Downtown', this)">D-02</div>
                <div class="map-node" style="top:75%; left:30%" onclick="filterZone('Harbor', this)">H-03</div>
                <div class="map-node" style="top:10%; left:55%" onclick="filterZone('Vinewood', this)">V-04</div>
            </div>
            <p style="text-align:center; font-size:10px; color:var(--text-dim); margin-top:20px; letter-spacing:3px;">SELECT SECTOR TO FILTER UPLINK</p>
        </div>

        <div id="screen-data" class="screen">
            <div class="stat-grid">
                <div class="stat-box">
                    <div id="stat-count" class="stat-val">00</div>
                    <div class="stat-label">Verified Assets</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">98%</div>
                    <div class="stat-label">System Health</div>
                </div>
            </div>
            
            <div style="margin-top: 50px; border-top: 1px solid var(--border); padding-top: 30px;">
                <div style="font-size: 11px; color: var(--danger); font-weight: bold; margin-bottom: 15px;">CRITICAL SYSTEM PROTOCOL</div>
                <button class="btn btn-danger" onclick="nuke()">RESET LOCAL DATABASE</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="modal">
        <div class="sheet">
            <h2 id="modalTitle" style="margin-top:0; font-style: italic; letter-spacing: 2px;">SECURE UPLINK</h2>
            <input type="text" id="vName" placeholder="VEHICLE MODEL">
            <select id="vGarage">
                <option value="North Zone">NORTH ZONE GARAGE</option>
                <option value="Downtown">DOWNTOWN HUB</option>
                <option value="Harbor">HARBOR DOCKS</option>
                <option value="Vinewood">VINEWOOD ESTATE</option>
            </select>
            <input type="text" id="vTags" placeholder="TAGS (e.g. SUPER, DRIFT)">
            <input type="file" id="vImg" accept="image/*" style="border:none; padding:0; font-size:10px;">
            
            <button class="btn" onclick="save()">CONFIRM UPLINK</button>
            <button id="delBtn" class="btn btn-danger" onclick="remove()" style="display:none">SCRAP ASSET</button>
            <button class="btn" style="background:none; color:white; margin-top:10px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <script>
        let db = JSON.parse(localStorage.getItem('VCORE_RESTORED_DB')) || [];
        let currentEditIdx = null;
        let currentZone = '';

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'data') updateStats();
        }

        function filterZone(zone, el) {
            document.querySelectorAll('.map-node').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            currentZone = zone;
            render();
            // Automatically jump to garage to show results
            switchTab('garage', document.querySelector('.nav-item'));
        }

        function openModal(idx = null) {
            currentEditIdx = idx;
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('delBtn');

            // BLANKING LOGIC: Always start clean
            document.getElementById('vName').value = '';
            document.getElementById('vTags').value = '';
            document.getElementById('vImg').value = '';
            document.getElementById('modalTitle').innerText = "SECURE UPLINK";
            delBtn.style.display = 'none';

            if(idx !== null) {
                const v = db[idx];
                document.getElementById('vName').value = v.name;
                document.getElementById('vTags').value = v.tags.join(', ');
                document.getElementById('vGarage').value = v.garage;
                document.getElementById('modalTitle').innerText = "MODIFY ASSET";
                delBtn.style.display = 'block';
            }
            
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function save() {
            const name = document.getElementById('vName').value.trim();
            const garage = document.getElementById('vGarage').value;
            const tags = document.getElementById('vTags').value.split(',').map(t => t.trim());
            const file = document.getElementById('vImg').files[0];

            if(!name) return alert("UPLINK DENIED: NAME REQUIRED");

            let imgBase = currentEditIdx !== null ? db[currentEditIdx].img : '';
            if(file) imgBase = await toBase64(file);

            const vehicleData = { name, garage, tags, img: imgBase };

            if(currentEditIdx !== null) db[currentEditIdx] = vehicleData;
            else db.push(vehicleData);

            localStorage.setItem('VCORE_RESTORED_DB', JSON.stringify(db));
            render();
            closeModal();
        }

        function remove() {
            if(confirm("PERMANENTLY SCRAP THIS VEHICLE?")) {
                db.splice(currentEditIdx, 1);
                localStorage.setItem('VCORE_RESTORED_DB', JSON.stringify(db));
                render();
                closeModal();
            }
        }

        function nuke() {
            if(confirm("THIS WILL ERASE THE ENTIRE DATABASE. PROCEED?")) {
                db = [];
                localStorage.removeItem('VCORE_RESTORED_DB');
                render();
                switchTab('garage', document.querySelector('.nav-item'));
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = db.filter(v => {
                const matchSearch = v.name.toLowerCase().includes(search) || v.tags.some(t => t.toLowerCase().includes(search));
                const matchZone = currentZone === '' || v.garage === currentZone;
                return matchSearch && matchZone;
            });

            if(filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#444; letter-spacing:3px; font-size:12px;">NO ASSETS DETECTED</div>';
            }

            filtered.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(db.indexOf(v));
                card.innerHTML = `
                    <img src="${v.img || 'https://via.placeholder.com/400x200/080808/00f2ff?text=NO+IMAGE'}" class="card-img">
                    <div class="card-info">
                        <div class="card-meta">${v.garage}</div>
                        <div class="card-name">${v.name}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('stat-count').innerText = db.length.toString().padStart(2, '0');
        }

        const toBase64 = file => new Promise((res) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });

        // Initialize
        render();
    </script>
</body>
</html>
