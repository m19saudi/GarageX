<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE // VEHICLE MANAGEMENT SYSTEM</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.98);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --danger: #ff3e3e;
            --text-main: #ffffff;
            --text-dim: #777;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Impact, sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); overflow: hidden; height: 100%; width: 100%; }

        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 1000; opacity: 0.15;
        }

        .hud-container { display: flex; flex-direction: column; height: 100vh; padding: 25px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }

        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .brand { letter-spacing: 5px; font-weight: 900; font-style: italic; font-size: 1.4rem; color: var(--text-main); }
        .brand span { color: var(--accent); }

        nav { display: flex; gap: 20px; }
        .nav-item { cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: bold; color: var(--text-dim); letter-spacing: 1px; position: relative; transition: 0.3s; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -16px; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .screen { display: none; flex: 1; overflow-y: auto; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .card { background: var(--panel); border: 1px solid var(--border); height: 180px; position: relative; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.85); border-top: 1px solid rgba(0,242,255,0.1); }
        .card-name { font-weight: 900; text-transform: uppercase; font-size: 1rem; }
        .card-meta { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* NETWORK MAP */
        .map-wrapper { height: 500px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); position: relative; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; cursor: crosshair; }
        .map-node { position: absolute; width: 60px; height: 60px; border: 2px solid var(--accent); background: rgba(0, 242, 255, 0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transition: transform 0.2s; z-index: 50; }
        .map-node.dragging { opacity: 0.5; border-style: dashed; z-index: 100; }
        .map-node:hover { box-shadow: 0 0 20px var(--accent); }

        /* DATA & BULK */
        .data-section { background: rgba(255,255,255,0.03); padding: 25px; border-left: 4px solid var(--accent); margin-bottom: 25px; }
        .bulk-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .bulk-table th { text-align: left; padding: 10px; font-size: 10px; color: var(--accent); border-bottom: 1px solid #222; }
        .bulk-table td { padding: 4px 5px; border-bottom: 1px solid #111; vertical-align: middle; }
        .table-input { background: #111; border: 1px solid #222; color: white; padding: 10px; width: 100%; font-size: 13px; outline: none; }

        /* BUTTONS */
        .btn { background: var(--accent); color: black; border: none; padding: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 1px; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-danger { background: var(--danger); color: white; border: none; }
        .btn-ghost { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .overlay.active { display: flex; }
        .modal-sheet { background: #080808; width: 100%; max-width: 550px; border: 1px solid var(--accent); padding: 30px; }

        .upload-area { border: 2px dashed #333; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .upload-area.dragover { border-color: var(--accent); }
        
        .fab { position: fixed; bottom: 35px; right: 35px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 32px; cursor: pointer; z-index: 100; box-shadow: 0 0 20px var(--accent-glow); }
    </style>
</head>
<body onclick="checkClickOutside(event)">

    <div class="hud-container">
        <header>
            <div class="brand">V-CORE // <span>OS</span></div>
            <nav>
                <div class="nav-item active" onclick="switchTab('garage', this)">GARAGE</div>
                <div class="nav-item" onclick="switchTab('network', this)">NETWORK</div>
                <div class="nav-item" onclick="switchTab('data', this)">DATA</div>
            </nav>
        </header>

        <div id="screen-garage" class="screen active">
            <input type="text" id="searchInput" placeholder="SEARCH ASSET DATABASE..." oninput="render()" style="background: transparent; border: none; border-bottom: 1px solid var(--border); font-size: 18px; padding: 10px 0; margin-bottom: 25px; width:100%; color:white; outline:none;">
            <div id="grid" class="grid"></div>
        </div>

        <div id="screen-network" class="screen">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-outline" onclick="addSector()" style="width:auto; padding:10px 20px;">ADD GARAGE</button>
                <button id="rearrangeBtn" class="btn btn-outline" onclick="toggleRearrange()" style="width:auto; padding:10px 20px;">REARRANGE: OFF</button>
            </div>
            <div class="map-wrapper" id="map"></div>
            <p style="text-align:center; font-size:10px; color:var(--text-dim); margin-top:20px; letter-spacing:4px;">CHOOSE A GARAGE TO EXPLORE</p>
        </div>

        <div id="screen-data" class="screen">
            <div class="data-section">
                <div style="font-size: 2.5rem; font-weight: 900; color: var(--accent);" id="stat-total">00</div>
                <div style="font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-bottom:20px;">TOTAL ASSETS DETECTED</div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <button class="btn" onclick="document.getElementById('importFile').click()">IMPORT DATABASE</button>
                    <button class="btn btn-outline" onclick="exportBackup()">EXPORT DATABASE</button>
                </div>
                <input type="file" id="importFile" hidden onchange="importDB(event)">
            </div>

            <div class="data-section" style="border-left-color: #fff;">
                <h3 style="font-size: 11px; letter-spacing: 2px; margin-top: 0; color: #fff;">BULK DATA ENTRY</h3>
                <table class="bulk-table">
                    <thead>
                        <tr><th style="width:50%">NAME</th><th>GARAGE</th><th style="width:40px; text-align:center;">X</th></tr>
                    </thead>
                    <tbody id="bulkBody"></tbody>
                </table>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                    <button class="btn btn-outline" onclick="addRows(5)" style="font-size:11px;">+ NEW ROWS</button>
                    <button class="btn" onclick="processBulk()" style="font-size:11px;">INITIALIZE AND SYNC</button>
                </div>
            </div>
            <button class="btn btn-danger" onclick="nukeDB()" style="padding:20px; font-size:13px;">PERMANENT SYSTEM DELETE</button>
        </div>
    </div>

    <div class="overlay" id="editOverlay">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-top:0; font-style: italic;">NEW CAR ASSET</h2>
            <input type="text" id="vName" placeholder="MODEL NAME" style="width:100%; background:#111; color:white; border:1px solid #333; padding:12px; margin-bottom:10px;">
            <select id="vGarage" style="width:100%; background:#111; color:white; border:1px solid #333; padding:12px; margin-bottom:10px;"></select>
            <input type="text" id="vTags" placeholder="TAGS (SUPER, SPORTS)" style="width:100%; background:#111; color:white; border:1px solid #333; padding:12px; margin-bottom:10px;">
            <div class="upload-area" id="dropZone">
                <span id="uploadLabel" style="font-size:10px; color:#777; text-transform:uppercase;">DRAG & DROP IMAGE OR CLICK</span>
                <input type="file" id="vImg" accept="image/*" onchange="updateUploadLabel(this)" style="position:absolute; opacity:0; inset:0; cursor:pointer;">
            </div>
            <button class="btn" onclick="saveVehicle()">CONFIRM</button>
            <button class="btn btn-ghost" style="margin-top:10px;" onclick="closeModal('editOverlay')">CANCEL</button>
        </div>
    </div>

    <div class="fab" onclick="openAdd()">+</div>

    <script>
        let db = JSON.parse(localStorage.getItem('VCORE_DB')) || [];
        let sectors = JSON.parse(localStorage.getItem('VCORE_SECTORS')) || [
            { id: 'S-01', name: 'NORTH SECTOR', x: 20, y: 20 },
            { id: 'S-02', name: 'DOWNTOWN HUB', x: 60, y: 40 }
        ];
        let rearrangeMode = false;
        let activeIdx = null;

        function checkClickOutside(e) {
            if(e.target.classList.contains('overlay')) { 
                document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
            }
        }

        /* SECTOR LOGIC */
        function addSector() {
            const name = prompt("Enter Garage Full Name:").toUpperCase();
            const code = prompt("Enter Short Code (e.g. S-03):").toUpperCase();
            if(name && code) {
                sectors.push({ id: code, name: name, x: Math.random()*80, y: Math.random()*80 });
                saveSectors();
                renderMap();
                updateGarageSelects();
            }
        }

        function toggleRearrange() {
            rearrangeMode = !rearrangeMode;
            document.getElementById('rearrangeBtn').innerText = rearrangeMode ? "REARRANGE: ON" : "REARRANGE: OFF";
            document.getElementById('rearrangeBtn').style.borderColor = rearrangeMode ? "var(--danger)" : "var(--accent)";
            renderMap();
        }

        function saveSectors() { localStorage.setItem('VCORE_SECTORS', JSON.stringify(sectors)); }

        function renderMap() {
            const map = document.getElementById('map');
            map.innerHTML = '';
            sectors.forEach((s, idx) => {
                const node = document.createElement('div');
                node.className = 'map-node';
                node.style.left = s.x + '%';
                node.style.top = s.y + '%';
                node.innerText = s.id;
                
                if(rearrangeMode) {
                    node.draggable = true;
                    node.style.cursor = 'move';
                    node.ondragstart = (e) => { e.dataTransfer.setData('idx', idx); node.classList.add('dragging'); };
                    node.ondragend = () => node.classList.remove('dragging');
                } else {
                    node.onclick = () => filterBySector(s.name);
                }
                map.appendChild(node);
            });
        }

        document.getElementById('map').ondragover = (e) => e.preventDefault();
        document.getElementById('map').ondrop = (e) => {
            const idx = e.dataTransfer.getData('idx');
            const rect = document.getElementById('map').getBoundingClientRect();
            sectors[idx].x = ((e.clientX - rect.left) / rect.width) * 100 - 5;
            sectors[idx].y = ((e.clientY - rect.top) / rect.height) * 100 - 5;
            saveSectors();
            renderMap();
        };

        /* CORE ENGINE */
        function sync() { 
            localStorage.setItem('VCORE_DB', JSON.stringify(db)); 
            render(); 
            updateStats(); 
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            db.filter(v => v.name.toLowerCase().includes(query)).forEach((v, i) => {
                const sectorObj = sectors.find(s => s.name === v.garage);
                const sectorTag = sectorObj ? `${v.garage} / ${sectorObj.id}` : v.garage;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${v.img || 'https://via.placeholder.com/300x150/111/00f2ff?text=NO+IMAGE'}" class="card-img">
                    <div class="card-info">
                        <div class="card-meta">${sectorTag}</div>
                        <div class="card-name">${v.name}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateGarageSelects() {
            const select = document.getElementById('vGarage');
            select.innerHTML = sectors.map(s => `<option value="${s.name}">${s.name} (${s.id})</option>`).join('');
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'network') renderMap();
            if(id === 'data') updateStats();
        }

        function filterBySector(name) {
            document.getElementById('searchInput').value = name;
            render();
            switchTab('garage', document.querySelector('.nav-item'));
        }

        /* BULK DATA */
        function addRows(count) {
            const tbody = document.getElementById('bulkBody');
            for(let i = 0; i < count; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="text" class="table-input bulk-name" placeholder="Model..." tabindex="1"></td>
                    <td>
                        <select class="table-input bulk-garage">
                            ${sectors.map(s => `<option value="${s.name}">${s.id}</option>`).join('')}
                        </select>
                    </td>
                    <td><div class="btn-ghost" style="text-align:center; padding:5px; cursor:pointer;" onclick="this.closest('tr').remove()">X</div></td>
                `;
                tbody.appendChild(row);
            }
        }

        function processBulk() {
            const names = document.querySelectorAll('.bulk-name');
            const garages = document.querySelectorAll('.bulk-garage');
            names.forEach((n, i) => { if(n.value.trim()) db.push({ name: n.value.trim(), garage: garages[i].value, tags: [], img: '' }); });
            sync(); document.getElementById('bulkBody').innerHTML = ''; switchTab('garage', document.querySelectorAll('.nav-item')[0]);
        }

        function openAdd() {
            updateGarageSelects();
            document.getElementById('editOverlay').classList.add('active');
        }

        async function saveVehicle() {
            const name = document.getElementById('vName').value.trim();
            if(!name) return;
            const file = document.getElementById('vImg').files[0];
            let img = '';
            if(file) img = await toBase64(file);
            db.push({ name, garage: document.getElementById('vGarage').value, tags: [], img });
            sync();
            closeModal('editOverlay');
        }

        function updateStats() { document.getElementById('stat-total').innerText = db.length.toString().padStart(2, '0'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function exportBackup() {
            const data = { db, sectors };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "VCORE_SYSTEM_BACKUP.json"; a.click();
        }
        function importDB(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                const data = JSON.parse(ev.target.result);
                db = data.db || [];
                sectors = data.sectors || sectors;
                sync();
                saveSectors();
                alert("SYSTEM RESTORED");
            };
            reader.readAsText(e.target.files[0]);
        }
        function nukeDB() { if(confirm("PERMANENT SYSTEM WIPE? THIS CANNOT BE UNDONE.")) { db = []; sync(); } }
        const toBase64 = file => new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result);
        });

        updateGarageSelects();
        render();
    </script>
</body>
</html>
