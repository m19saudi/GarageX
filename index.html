<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE // VEHICLE MANAGEMENT</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(15, 15, 15, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --danger: #ff4444;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(0, 242, 255, 0.2);
            --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); overflow: hidden; height: 100%; width: 100%; }

        /* HUD SCANLINES */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 1000; opacity: 0.2;
        }

        .hud-container { display: flex; flex-direction: column; height: 100vh; padding: 20px; max-width: 900px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .brand { letter-spacing: 3px; font-weight: 900; font-style: italic; color: var(--accent); }

        nav { display: flex; gap: 15px; }
        .nav-item { cursor: pointer; font-size: 10px; font-weight: bold; color: var(--text-dim); padding: 5px 10px; border: 1px solid transparent; transition: var(--transition); }
        .nav-item.active { color: var(--accent); border-color: var(--accent); box-shadow: inset 0 0 10px var(--accent-glow); }

        /* SCREENS */
        .screen { display: none; flex: 1; overflow-y: auto; padding-top: 10px; }
        .screen.active { display: block; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; padding-bottom: 100px; }
        .card { background: #111; border: 1px solid #222; height: 150px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--border); }
        .card-name { font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .card-meta { font-size: 9px; color: var(--accent); }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .overlay.active { display: flex; }
        .sheet { background: #080808; width: 100%; max-width: 380px; border: 1px solid var(--accent); padding: 25px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
        
        input, select { width: 100%; background: #151515; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 15px; outline: none; font-size: 13px; }
        input:focus { border-color: var(--accent); }

        .btn { background: var(--accent); color: black; border: none; padding: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 28px; cursor: pointer; box-shadow: 0 0 15px var(--accent-glow); z-index: 100; }
        
        .empty { text-align: center; color: var(--text-dim); padding: 40px; border: 1px dashed #333; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="hud-container">
        <header>
            <div class="brand">V-CORE // SYSTEM</div>
            <nav>
                <div class="nav-item active" onclick="switchTab('garage', this)">GARAGE</div>
                <div class="nav-item" onclick="switchTab('data', this)">SYSTEM</div>
            </nav>
        </header>

        <div id="screen-garage" class="screen active">
            <div id="grid" class="grid"></div>
        </div>

        <div id="screen-data" class="screen">
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-left: 3px solid var(--accent);">
                <div style="font-size: 10px; color: var(--text-dim);">ASSETS DETECTED</div>
                <div id="count" style="font-size: 24px; font-weight: bold; color: var(--accent);">00</div>
            </div>
            <button class="btn btn-danger" onclick="nuke()" style="margin-top: 30px;">WIPE ALL LOCAL DATA</button>
        </div>
    </div>

    <div class="overlay" id="modal">
        <div class="sheet">
            <div style="font-size: 12px; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px;">VEHICLE UPLINK PROTOCOL</div>
            <input type="text" id="vName" placeholder="MODEL NAME">
            <select id="vGarage">
                <option value="Main Garage">MAIN GARAGE</option>
                <option value="Underground">UNDERGROUND</option>
                <option value="CEO Office">CEO OFFICE</option>
            </select>
            <input type="file" id="vImg" accept="image/*" style="border:none; padding:0; font-size: 10px;">
            
            <button class="btn" onclick="save()">INITIALIZE UPLINK</button>
            <button id="delBtn" class="btn btn-danger" onclick="remove()" style="display:none">DELETE ASSET</button>
            <button class="btn" style="background:none; color:white; margin-top:5px;" onclick="closeModal()">ABORT</button>
        </div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <script>
        // Use a clean DB key for this version
        let db = JSON.parse(localStorage.getItem('VCORE_FINAL')) || [];
        let currentEdit = null;

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'data') document.getElementById('count').innerText = db.length.toString().padStart(2, '0');
        }

        function openModal(idx = null) {
            currentEdit = idx;
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('delBtn');

            // BLANKING: Always clear inputs when opening
            document.getElementById('vName').value = '';
            document.getElementById('vImg').value = '';
            delBtn.style.display = 'none';

            if(idx !== null) {
                const car = db[idx];
                document.getElementById('vName').value = car.name;
                document.getElementById('vGarage').value = car.garage;
                delBtn.style.display = 'block';
            }
            
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function save() {
            const name = document.getElementById('vName').value.trim();
            const garage = document.getElementById('vGarage').value;
            const file = document.getElementById('vImg').files[0];

            if(!name) return alert("NAME REQUIRED");

            let imgData = currentEdit !== null ? db[currentEdit].img : '';
            if(file) {
                try {
                    imgData = await toBase64(file);
                } catch(e) {
                    console.error("Image Fail", e);
                }
            }

            const vehicle = { name, garage, img: imgData };

            if(currentEdit !== null) {
                db[currentEdit] = vehicle;
            } else {
                db.push(vehicle);
            }

            // CRITICAL: Force Sync & Close
            localStorage.setItem('VCORE_FINAL', JSON.stringify(db));
            render();
            closeModal();
            console.log("Vehicle Saved:", vehicle);
        }

        function remove() {
            if(confirm("DELETE THIS ASSET?")) {
                db.splice(currentEdit, 1);
                localStorage.setItem('VCORE_FINAL', JSON.stringify(db));
                render();
                closeModal();
            }
        }

        function nuke() {
            if(confirm("WIPE ALL DATA?")) {
                db = [];
                localStorage.removeItem('VCORE_FINAL');
                render();
                switchTab('garage', document.querySelector('.nav-item'));
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if(db.length === 0) {
                grid.innerHTML = '<div class="empty">NO VEHICLES IN DATABASE</div>';
                return;
            }

            db.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(i);
                card.innerHTML = `
                    <img src="${v.img || 'https://via.placeholder.com/300x150/111/00f2ff?text=NO+UPLINK'}" class="card-img">
                    <div class="card-info">
                        <div class="card-meta">${v.garage}</div>
                        <div class="card-name">${v.name}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        const toBase64 = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        // Initial Load
        render();
    </script>
</body>
</html>
