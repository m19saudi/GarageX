<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage V4</title>

<style>
:root{
--bg:#050506;
--card:rgba(255,255,255,0.04);
--glass:rgba(255,255,255,0.06);
--neon:#00ffc6;
--accent:#d4af37;
--text:#ffffff;
}

*{box-sizing:border-box;font-family:system-ui;}
body{
margin:0;
background:radial-gradient(circle at top,#0a0a0a,#050506);
color:var(--text);
overflow-x:hidden;
}

/* HEADER */
header{
padding:16px;
font-size:18px;
letter-spacing:1px;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* SCREENS */
.wrapper{
display:flex;
width:300%;
transition:.5s cubic-bezier(.77,0,.18,1);
}
.screen{
width:100%;
padding-bottom:90px;
}

/* SEARCH */
.search{padding:12px;}
.search input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:rgba(255,255,255,0.05);
color:white;
backdrop-filter:blur(10px);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;
padding:12px;
}

.card{
background:var(--card);
border-radius:18px;
overflow:hidden;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
position:relative;
}
.card:active{
transform:scale(.96);
box-shadow:0 0 15px var(--neon);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(0,255,200,.15),transparent);
opacity:0;
transition:.3s;
}
.card:hover::after{opacity:1}

/* MAP GRID */
.map{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:12px;
}
.zone{
padding:30px 10px;
text-align:center;
border-radius:16px;
background:var(--glass);
cursor:pointer;
position:relative;
}
.zone.active{
outline:2px solid var(--neon);
}
.zone span{
font-size:12px;
color:#aaa;
}

/* FAB */
.fab{
position:fixed;
bottom:90px;
right:20px;
width:65px;height:65px;
border-radius:50%;
border:none;
font-size:32px;
color:black;
background:linear-gradient(135deg,var(--accent),var(--neon));
box-shadow:0 0 20px var(--neon);
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#0b0b0c;
border-top:1px solid rgba(255,255,255,0.1);
}
nav div{
flex:1;
text-align:center;
padding:14px;
cursor:pointer;
}
nav .active{color:var(--neon)}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:flex-end;
}
.modal-content{
background:#0b0b0c;
width:100%;
max-height:90%;
padding:16px;
border-radius:20px 20px 0 0;
animation:slide .3s;
}
@keyframes slide{
from{transform:translateY(100%)}
to{transform:translateY(0)}
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.05);
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:5px;
background:var(--accent);
}

/* DETAIL */
.detail img{
width:100%;
border-radius:14px;
margin-bottom:10px;
}

/* EMPTY */
.empty{
text-align:center;
padding:50px;
color:#777;
}
</style>
</head>

<body>

<header>🚗 GARAGE V4</header>

<div class="wrapper" id="wrapper">

<!-- GARAGE -->
<div class="screen">
<div class="search">
<input id="search" placeholder="Search vehicles...">
</div>
<div id="grid" class="grid"></div>
</div>

<!-- MAP -->
<div class="screen">
<div class="map" id="map"></div>
</div>

<!-- STATS -->
<div class="screen">
<div id="stats"></div>
</div>

</div>

<nav>
<div class="active" onclick="go(0,this)">Garage</div>
<div onclick="go(1,this)">Map</div>
<div onclick="go(2,this)">Stats</div>
</nav>

<button class="fab" onclick="openForm()">+</button>

<!-- FORM -->
<div class="modal" id="formModal">
<div class="modal-content">
<input id="name" placeholder="Name">
<input id="garage" placeholder="Garage Zone (e.g. A1)">
<input id="tags" placeholder="Tags">
<textarea id="notes"></textarea>
<input type="file" id="img">
<img id="preview" style="width:100%;display:none;border-radius:10px">
<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>
</div>
</div>

<!-- DETAIL -->
<div class="modal" id="detailModal">
<div class="modal-content detail">
<img id="dImg">
<h2 id="dName"></h2>
<p id="dGarage"></p>
<p id="dTags"></p>
<p id="dNotes"></p>
<button onclick="edit()">Edit</button>
<button onclick="del()">Delete</button>
<button onclick="closeDetail()">Close</button>
</div>
</div>

<script>
let cars=JSON.parse(localStorage.getItem("cars")||"[]");
let current=null,activeZone=null;

/* NAV */
function go(i,el){
wrapper.style.transform=`translateX(-${i*100}%)`;
document.querySelectorAll("nav div").forEach(d=>d.classList.remove("active"));
el.classList.add("active");
}

/* RENDER */
function render(){
let grid=document.getElementById("grid");
let s=search.value.toLowerCase();
grid.innerHTML="";

let f=cars.filter(c=>
(!activeZone||c.garage===activeZone) &&
(c.name+c.tags+c.notes).toLowerCase().includes(s)
);

if(!f.length) grid.innerHTML=`<div class="empty">No vehicles</div>`;

f.forEach((c,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`<img src="${c.image||''}">
<div style="padding:10px">
<b>${c.name}</b><br><small>${c.garage}</small>
</div>`;
d.onclick=()=>openDetail(i);
grid.appendChild(d);
});

renderMap();
renderStats();
localStorage.setItem("cars",JSON.stringify(cars));
}

/* MAP */
function renderMap(){
let zones=[...new Set(cars.map(c=>c.garage))];
map.innerHTML="";
zones.forEach(z=>{
let d=document.createElement("div");
d.className="zone"+(activeZone===z?" active":"");
d.innerHTML=`${z}<br><span>${cars.filter(c=>c.garage===z).length} cars</span>`;
d.onclick=()=>{activeZone=activeZone===z?null:z;render();}
map.appendChild(d);
});
}

/* STATS */
function renderStats(){
let s=document.getElementById("stats");
let total=cars.length;
let garages={};
cars.forEach(c=>garages[c.garage]=(garages[c.garage]||0)+1);

s.innerHTML=`<div style="padding:12px">Total Cars: ${total}</div>`;
for(let g in garages){
s.innerHTML+=`<div style="padding:12px">${g}: ${garages[g]}</div>`;
}
}

/* FORM */
function openForm(){formModal.style.display="flex";}
function closeForm(){formModal.style.display="none";}

img.onchange=e=>{
let r=new FileReader();
r.onload=()=>{preview.src=r.result;preview.style.display="block";}
r.readAsDataURL(e.target.files[0]);
};

function save(){
cars.push({
name:name.value,
garage:garage.value,
tags:tags.value,
notes:notes.value,
image:preview.src||""
});
closeForm();render();
}

/* DETAIL */
function openDetail(i){
current=i;
let c=cars[i];
detailModal.style.display="flex";
dImg.src=c.image;
dName.innerText=c.name;
dGarage.innerText=c.garage;
dTags.innerText=c.tags;
dNotes.innerText=c.notes;
}
function closeDetail(){detailModal.style.display="none";}
function del(){cars.splice(current,1);closeDetail();render();}
function edit(){closeDetail();openForm();}

search.oninput=render;

render();
</script>

</body>
</html>
