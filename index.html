<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Elite</title>

<style>
:root {
  --bg:#0b0b0c;
  --card:rgba(255,255,255,0.05);
  --glass:rgba(255,255,255,0.08);
  --accent:#d4af37;
  --neon:#00ffc6;
  --text:#fff;
}

* {box-sizing:border-box; font-family:system-ui;}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  padding:16px;
  font-size:18px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
}

/* NAV */
nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid #222;
}
nav div {
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
}
nav div.active {
  color:var(--neon);
}

/* SCREENS */
.screen {display:none; padding-bottom:70px;}
.screen.active {display:block;}

/* SEARCH */
.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1a1a1d;
  color:white;
}

/* FILTER CHIPS */
.filters {
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.chip {
  padding:6px 10px;
  background:#222;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}
.chip.active {
  background:var(--neon);
  color:black;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:10px;
}

.card {
  background:var(--card);
  backdrop-filter:blur(10px);
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
  border:1px solid rgba(255,255,255,0.08);
}
.card:active {
  transform:scale(0.97);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-content {
  padding:10px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:80px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--neon));
  border:none;
  font-size:30px;
  color:black;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#111;
  padding:16px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* INPUT */
input, textarea {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1f1f22;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:var(--accent);
}

/* DETAIL VIEW */
.detail img {
  width:100%;
  border-radius:12px;
}

/* STATS */
.stat {
  background:var(--glass);
  margin:10px;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  🚗 Garage Elite
</header>

<!-- GARAGE SCREEN -->
<div id="garage" class="screen active">

<div class="search">
  <input id="search" placeholder="Search cars...">
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

</div>

<!-- STATS SCREEN -->
<div id="stats" class="screen">
  <div id="statsContent"></div>
</div>

<!-- NAV -->
<nav>
  <div class="active" onclick="switchTab('garage',this)">Garage</div>
  <div onclick="switchTab('stats',this)">Stats</div>
</nav>

<!-- FAB -->
<button class="fab" onclick="openForm()">+</button>

<!-- FORM MODAL -->
<div class="modal" id="formModal">
  <div class="modal-content">
    <h3 id="formTitle">Add Car</h3>
    <input id="name" placeholder="Name">
    <input id="garageInput" placeholder="Garage">
    <input id="tags" placeholder="Tags">
    <textarea id="notes"></textarea>
    <input type="file" id="image">
    <img id="preview" style="width:100%; display:none; margin-top:5px; border-radius:10px;">
    <button onclick="saveCar()">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="detailModal">
  <div class="modal-content detail">
    <img id="dImg">
    <h2 id="dName"></h2>
    <p id="dGarage"></p>
    <p id="dTags"></p>
    <p id="dNotes"></p>
    <button onclick="editCurrent()">Edit</button>
    <button onclick="deleteCar()">Delete</button>
    <button onclick="closeDetail()">Close</button>
  </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")||"[]");
let current=null;
let editIndex=null;
let activeTag=null;

function saveStorage(){
  localStorage.setItem("cars",JSON.stringify(cars));
}

/* RENDER */
function render(){
  let grid=document.getElementById("grid");
  let search=document.getElementById("search").value.toLowerCase();

  grid.innerHTML="";

  let filtered=cars.filter(c=>{
    return (!activeTag || c.tags.includes(activeTag)) &&
    (c.name+c.garage+c.tags+c.notes).toLowerCase().includes(search);
  });

  filtered.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${c.image||''}">
      <div class="card-content">
        <b>${c.name}</b><br>
        <small>${c.garage}</small>
      </div>
    `;
    div.onclick=()=>openDetail(i);
    grid.appendChild(div);
  });

  renderFilters();
  renderStats();
  saveStorage();
}

/* FILTERS */
function renderFilters(){
  let tags=[...new Set(cars.flatMap(c=>c.tags.split(",")))];
  let container=document.getElementById("filters");
  container.innerHTML="";
  tags.forEach(t=>{
    let chip=document.createElement("div");
    chip.className="chip"+(activeTag===t?" active":"");
    chip.innerText=t;
    chip.onclick=()=>{activeTag=activeTag===t?null:t; render();}
    container.appendChild(chip);
  });
}

/* STATS */
function renderStats(){
  let stats=document.getElementById("statsContent");
  let garages={};

  cars.forEach(c=>{
    garages[c.garage]=(garages[c.garage]||0)+1;
  });

  stats.innerHTML="<div class='stat'>Total Cars: "+cars.length+"</div>";

  for(let g in garages){
    stats.innerHTML+=`<div class="stat">${g}: ${garages[g]}</div>`;
  }
}

/* FORM */
function openForm(){
  document.getElementById("formModal").style.display="flex";
}
function closeForm(){
  formModal.style.display="none";
}

image.onchange=e=>{
  let reader=new FileReader();
  reader.onload=()=>{
    preview.src=reader.result;
    preview.style.display="block";
  }
  reader.readAsDataURL(e.target.files[0]);
};

function saveCar(){
  let car={
    name:name.value,
    garage:garageInput.value,
    tags:tags.value,
    notes:notes.value,
    image:preview.src||""
  };

  if(editIndex!==null) cars[editIndex]=car;
  else cars.push(car);

  closeForm();
  render();
}

/* DETAIL */
function openDetail(i){
  current=i;
  let c=cars[i];
  detailModal.style.display="flex";

  dImg.src=c.image;
  dName.innerText=c.name;
  dGarage.innerText=c.garage;
  dTags.innerText=c.tags;
  dNotes.innerText=c.notes;
}

function closeDetail(){
  detailModal.style.display="none";
}

function deleteCar(){
  cars.splice(current,1);
  closeDetail();
  render();
}

function editCurrent(){
  let c=cars[current];
  openForm();
  name.value=c.name;
  garageInput.value=c.garage;
  tags.value=c.tags;
  notes.value=c.notes;
  preview.src=c.image;
  preview.style.display="block";
  editIndex=current;
  closeDetail();
}

/* NAV */
function switchTab(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll("nav div").forEach(d=>d.classList.remove("active"));
  el.classList.add("active");
}

search.oninput=render;

render();
</script>

</body>
</html>
