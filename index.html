<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage V3 Pro</title>

<style>
:root{
--bg:#0a0a0b;
--card:rgba(255,255,255,0.05);
--glass:rgba(255,255,255,0.08);
--accent:#d4af37;
--neon:#00ffc6;
--text:#fff;
}

*{box-sizing:border-box;font-family:system-ui;}
body{margin:0;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HEADER */
header{
padding:16px;
font-weight:bold;
display:flex;
justify-content:space-between;
border-bottom:1px solid #222;
}

/* SCREENS */
.wrapper{
display:flex;
width:200%;
transition:0.4s ease;
}
.screen{
width:100%;
padding-bottom:80px;
}

/* SEARCH */
.search{padding:10px}
.search input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1a1a1d;
color:white;
}

/* FILTER */
.filters{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:10px;
}
.chip{
padding:6px 10px;
border-radius:20px;
background:#222;
font-size:12px;
cursor:pointer;
}
.chip.active{
background:var(--neon);
color:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
padding:10px;
}

.card{
background:var(--card);
backdrop-filter:blur(10px);
border-radius:16px;
overflow:hidden;
transition:.25s;
border:1px solid rgba(255,255,255,0.08);
}
.card:active{transform:scale(.96)}

.card img{
width:100%;
height:120px;
object-fit:cover;
background:#111;
}

/* EMPTY */
.empty{
text-align:center;
padding:40px;
color:#777;
}

/* FAB */
.fab{
position:fixed;
bottom:80px;
right:20px;
width:60px;height:60px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,var(--accent),var(--neon));
font-size:30px;
color:black;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%,100%{box-shadow:0 0 10px var(--neon);}
50%{box-shadow:0 0 25px var(--neon);}
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
border-top:1px solid #222;
}
nav div{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
}
nav .active{color:var(--neon)}

/* MODALS */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:flex-end;
}
.modal-content{
background:#111;
width:100%;
max-height:90%;
padding:16px;
border-radius:20px 20px 0 0;
animation:slideUp .3s;
}
@keyframes slideUp{
from{transform:translateY(100%)}
to{transform:translateY(0)}
}

/* INPUT */
input,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:10px;
border:none;
background:#1f1f22;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:10px;
background:var(--accent);
}

/* STATS */
.stat{
background:var(--glass);
margin:10px;
padding:12px;
border-radius:12px;
}
.bar{
height:6px;
background:var(--neon);
margin-top:5px;
border-radius:6px;
}
</style>
</head>

<body>

<header>🚗 Garage V3 Pro</header>

<div class="wrapper" id="wrapper">

<!-- GARAGE -->
<div class="screen">
<div class="search">
<input id="search" placeholder="Search...">
</div>

<div class="filters" id="filters"></div>

<div id="grid" class="grid"></div>

</div>

<!-- STATS -->
<div class="screen">
<div id="stats"></div>
</div>

</div>

<!-- NAV -->
<nav>
<div class="active" onclick="go(0,this)">Garage</div>
<div onclick="go(1,this)">Stats</div>
</nav>

<button class="fab" onclick="openForm()">+</button>

<!-- FORM -->
<div class="modal" id="formModal">
<div class="modal-content">
<input id="name" placeholder="Name">
<input id="garage" placeholder="Garage">
<input id="tags" placeholder="Tags">
<textarea id="notes"></textarea>
<input type="file" id="img">
<img id="preview" style="width:100%;display:none;border-radius:10px">
<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>
</div>
</div>

<!-- DETAIL -->
<div class="modal" id="detailModal">
<div class="modal-content">
<img id="dImg" style="width:100%;border-radius:10px">
<h2 id="dName"></h2>
<p id="dGarage"></p>
<p id="dTags"></p>
<p id="dNotes"></p>
<button onclick="edit()">Edit</button>
<button onclick="del()">Delete</button>
<button onclick="closeDetail()">Close</button>
</div>
</div>

<script>
let cars=JSON.parse(localStorage.getItem("cars")||"[]");
let activeTag=null,current=null,editIndex=null;

function vibrate(){if(navigator.vibrate) navigator.vibrate(30);}

function saveStorage(){
localStorage.setItem("cars",JSON.stringify(cars));
}

function render(){
let grid=document.getElementById("grid");
let s=search.value.toLowerCase();
grid.innerHTML="";

let f=cars.filter(c=>
(!activeTag||c.tags.includes(activeTag)) &&
(c.name+c.garage+c.tags+c.notes).toLowerCase().includes(s)
);

if(!f.length){
grid.innerHTML=`<div class="empty">No cars yet 🚗</div>`;
}

f.forEach((c,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`
<img src="${c.image||''}">
<div style="padding:10px">
<b>${c.name}</b><br>
<small>${c.garage}</small>
</div>`;
d.onclick=()=>{openDetail(i);vibrate();}
grid.appendChild(d);
});

renderFilters();
renderStats();
saveStorage();
}

function renderFilters(){
let tags=[...new Set(cars.flatMap(c=>c.tags.split(",")))];
filters.innerHTML="";
tags.forEach(t=>{
let el=document.createElement("div");
el.className="chip"+(activeTag===t?" active":"");
el.innerText=t;
el.onclick=()=>{activeTag=activeTag===t?null:t;render();}
filters.appendChild(el);
});
}

/* STATS */
function renderStats(){
let s=document.getElementById("stats");
let g={};
cars.forEach(c=>g[c.garage]=(g[c.garage]||0)+1);

s.innerHTML=`<div class="stat">Total: ${cars.length}</div>`;
for(let k in g){
let pct=(g[k]/cars.length)*100;
s.innerHTML+=`
<div class="stat">
${k} (${g[k]})
<div class="bar" style="width:${pct}%"></div>
</div>`;
}
}

/* NAV */
function go(i,el){
wrapper.style.transform=`translateX(-${i*100}%)`;
document.querySelectorAll("nav div").forEach(d=>d.classList.remove("active"));
el.classList.add("active");
}

/* FORM */
function openForm(){formModal.style.display="flex";}
function closeForm(){formModal.style.display="none";}

img.onchange=e=>{
let r=new FileReader();
r.onload=()=>{preview.src=r.result;preview.style.display="block";}
r.readAsDataURL(e.target.files[0]);
};

function save(){
let car={
name:name.value,
garage:garage.value,
tags:tags.value,
notes:notes.value,
image:preview.src||""
};
if(editIndex!=null) cars[editIndex]=car;
else cars.push(car);
closeForm();render();vibrate();
}

/* DETAIL */
function openDetail(i){
current=i;
let c=cars[i];
detailModal.style.display="flex";
dImg.src=c.image;
dName.innerText=c.name;
dGarage.innerText=c.garage;
dTags.innerText=c.tags;
dNotes.innerText=c.notes;
}

function closeDetail(){detailModal.style.display="none";}
function del(){cars.splice(current,1);closeDetail();render();}
function edit(){
let c=cars[current];
openForm();
name.value=c.name;
garage.value=c.garage;
tags.value=c.tags;
notes.value=c.notes;
preview.src=c.image;preview.style.display="block";
editIndex=current;
closeDetail();
}

search.oninput=render;
render();
</script>

</body>
</html>
