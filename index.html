<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE // VEHICLE MANAGEMENT</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(15, 15, 15, 0.85);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --gold: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* BACKGROUND EFFECTS */
        .v-bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        /* SCANLINE EFFECT */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.3;
        }

        /* HUD LAYOUT */
        .hud-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .brand {
            letter-spacing: 4px;
            font-weight: 900;
            font-style: italic;
        }

        .brand span { color: var(--accent); }

        /* NAVIGATION */
        nav {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-dim);
            transition: var(--transition);
            position: relative;
        }

        .nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* SCREENS */
        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            animation: screenFade 0.5s ease;
        }

        .screen.active { display: block; }

        @keyframes screenFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* GARAGE GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 100px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            height: 180px;
        }

        .card:hover, .card:active {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: 0.5s;
        }

        .card:hover .card-img { opacity: 0.9; }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .card-name {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-garage {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* LIGHT SWEEP EFFECT */
        .sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: sweep 4s infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* MAP VIEW */
        .map-container {
            height: 400px;
            border: 1px solid var(--border);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-node {
            width: 60px;
            height: 60px;
            border: 1px solid var(--accent);
            background: rgba(0, 242, 255, 0.1);
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .map-node:hover { background: var(--accent); color: black; }
        .map-node span { font-size: 9px; font-weight: bold; }
        .map-node.active { box-shadow: 0 0 15px var(--accent); border-width: 2px; }

        /* STATS PANEL */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-box {
            background: var(--glass);
            padding: 20px;
            border-left: 3px solid var(--accent);
        }

        .stat-val { font-size: 32px; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); }

        .progress-container { margin-top: 15px; }
        .progress-bar {
            height: 4px;
            background: #222;
            width: 100%;
            margin-top: 5px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: 1s ease-out;
            width: 0;
        }

        /* MODALS / OVERLAYS */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sheet {
            background: var(--bg);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--accent);
            position: relative;
            transform: translateY(100px);
            transition: var(--transition);
        }

        .overlay.active { display: flex; }
        .overlay.active .sheet { transform: translateY(0); }

        .sheet-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sheet-body { padding: 20px; }

        /* FORMS */
        input, select, textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--accent-glow);
            cursor: pointer;
            z-index: 100;
            transition: var(--transition);
        }

        .fab:hover { transform: rotate(90deg) scale(1.1); }

        /* SEARCH BAR */
        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            background: var(--glass);
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 18px;
            padding: 10px 0;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
            border: 1px dashed var(--border);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="v-bg-glow"></div>
    
    <div class="hud-container">
        <header>
            <div class="brand">V-CORE // <span>OS</span></div>
            <nav id="mainNav">
                <div class="nav-item active" onclick="showScreen('garage')">Garage</div>
                <div class="nav-item" onclick="showScreen('map')">Network</div>
                <div class="nav-item" onclick="showScreen('stats')">Data</div>
            </nav>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="SEARCH VEHICLE DATABASE..." oninput="renderVehicles()">
        </div>

        <div id="screen-garage" class="screen active">
            <div id="vehicleGrid" class="grid">
                </div>
        </div>

        <div id="screen-map" class="screen">
            <div class="map-container" id="mapContainer">
                <div class="map-node active" style="top:20%; left:20%" onclick="filterByGarage('North Los Santos', this)">
                    <span>01</span><span style="font-size:7px">NORTH</span>
                </div>
                <div class="map-node" style="top:40%; left:70%" onclick="filterByGarage('Downtown', this)">
                    <span>02</span><span style="font-size:7px">D-TOWN</span>
                </div>
                <div class="map-node" style="top:70%; left:30%" onclick="filterByGarage('Vespucci', this)">
                    <span>03</span><span style="font-size:7px">VESP</span>
                </div>
                <div class="map-node" style="top:10%; left:55%" onclick="filterByGarage('Vinewood', this)">
                    <span>04</span><span style="font-size:7px">WOOD</span>
                </div>
            </div>
            <p style="text-align:center; font-size:10px; color:var(--text-dim); margin-top:20px; letter-spacing:2px">SELECT ZONE TO FILTER LOCAL UPLINK</p>
        </div>

        <div id="screen-stats" class="screen">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Fleet</div>
                    <div id="stat-total" class="stat-val">00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">System Integrity</div>
                    <div class="stat-val">98%</div>
                </div>
            </div>
            <div class="stat-box" style="margin-top:20px">
                <div class="stat-label">Garage Distribution</div>
                <div id="distributionBars"></div>
            </div>
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="exportData()">EXPORT JSON</button>
                <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">IMPORT</button>
                <input type="file" id="importFile" hidden onchange="importData(this)">
            </div>
        </div>
    </div>

    <div class="overlay" id="modalOverlay">
        <div class="sheet">
            <div class="sheet-header">
                <div style="font-weight:bold; letter-spacing:1px" id="modalTitle">REGISTER VEHICLE</div>
                <div style="cursor:pointer; color:var(--accent)" onclick="closeModal()">✕</div>
            </div>
            <div class="sheet-body">
                <input type="text" id="vName" placeholder="VEHICLE NAME">
                <select id="vGarage">
                    <option value="North Los Santos">NORTH LOS SANTOS</option>
                    <option value="Downtown">DOWNTOWN</option>
                    <option value="Vespucci">VESPUCCI</option>
                    <option value="Vinewood">VINEWOOD</option>
                </select>
                <input type="text" id="vTags" placeholder="TAGS (Comma separated)">
                <input type="file" id="vImg" accept="image/*" style="font-size:10px; border:none; padding:0">
                <button class="btn" onclick="saveVehicle()">CONFIRM UPLINK</button>
                <button id="deleteBtn" class="btn btn-outline" style="margin-top:10px; border-color:#ff4444; color:#ff4444; display:none" onclick="deleteVehicle()">SCRAP VEHICLE</button>
            </div>
        </div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <script>
        let vehicles = JSON.parse(localStorage.getItem('vcore_data')) || [];
        let editingIndex = null;
        let currentFilter = '';

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.classList.add('active');

            if(screenId === 'stats') updateStats();
        }

        function openModal(index = null) {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.add('active');
            
            if(index !== null) {
                editingIndex = index;
                const v = vehicles[index];
                document.getElementById('vName').value = v.name;
                document.getElementById('vGarage').value = v.garage;
                document.getElementById('vTags').value = v.tags.join(', ');
                document.getElementById('modalTitle').innerText = "MODIFY DATA";
                document.getElementById('deleteBtn').style.display = 'block';
            } else {
                editingIndex = null;
                document.getElementById('vName').value = '';
                document.getElementById('vTags').value = '';
                document.getElementById('modalTitle').innerText = "REGISTER VEHICLE";
                document.getElementById('deleteBtn').style.display = 'none';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function saveVehicle() {
            const name = document.getElementById('vName').value;
            const garage = document.getElementById('vGarage').value;
            const tags = document.getElementById('vTags').value.split(',').map(t => t.trim());
            const imgFile = document.getElementById('vImg').files[0];
            
            let imgBase64 = editingIndex !== null ? vehicles[editingIndex].image : '';
            
            if(imgFile) {
                imgBase64 = await toBase64(imgFile);
            }

            const vehicleData = { name, garage, tags, image: imgBase64 };

            if(editingIndex !== null) {
                vehicles[editingIndex] = vehicleData;
            } else {
                vehicles.push(vehicleData);
            }

            saveAndRender();
            closeModal();
        }

        function deleteVehicle() {
            if(confirm('SCRAP THIS ENTRY PERMANENTLY?')) {
                vehicles.splice(editingIndex, 1);
                saveAndRender();
                closeModal();
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function saveAndRender() {
            localStorage.setItem('vcore_data', JSON.stringify(vehicles));
            renderVehicles();
        }

        function filterByGarage(garage, el) {
            document.querySelectorAll('.map-node').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            currentFilter = garage;
            showScreen('garage');
            // Update nav visual since we force moved
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('[onclick="showScreen(\'garage\')"]').classList.add('active');
            renderVehicles();
        }

        function renderVehicles() {
            const grid = document.getElementById('vehicleGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = vehicles.filter(v => {
                const matchesSearch = v.name.toLowerCase().includes(search) || v.tags.some(t => t.toLowerCase().includes(search));
                const matchesGarage = currentFilter === '' || v.garage === currentFilter;
                return matchesSearch && matchesGarage;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1">NO DATA DETECTED IN THIS SECTOR</div>`;
                return;
            }

            filtered.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(vehicles.indexOf(v));
                card.innerHTML = `
                    <div class="sweep"></div>
                    <img src="${v.image || 'https://via.placeholder.com/400x200/111/222?text=NO+UPLINK'}" class="card-img">
                    <div class="card-info">
                        <div class="card-garage">${v.garage}</div>
                        <div class="card-name">${v.name}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = vehicles.length.toString().padStart(2, '0');
            const dist = {};
            vehicles.forEach(v => dist[v.garage] = (dist[v.garage] || 0) + 1);
            
            const barsContainer = document.getElementById('distributionBars');
            barsContainer.innerHTML = '';
            
            Object.keys(dist).forEach(g => {
                const percent = (dist[g] / vehicles.length) * 100;
                barsContainer.innerHTML += `
                    <div class="progress-container">
                        <div style="display:flex; justify-content:space-between; font-size:9px">
                            <span>${g.toUpperCase()}</span>
                            <span>${dist[g]}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                    </div>
                `;
            });
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vehicles));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "vcore_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        vehicles = imported;
                        saveAndRender();
                        alert('UPLINK SUCCESSFUL');
                    }
                } catch(e) {
                    alert('UPLINK FAILED: CORRUPT DATA');
                }
            };
            reader.readAsText(file);
        }

        // Init
        renderVehicles();
    </script>
</body>
</html>
