<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE // ULTRA</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: pan-y; /* Only allow vertical scrolling, stops horizontal jitter */
        }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            overflow: hidden; height: 100%; width: 100%;
        }

        /* HARDWARE ACCELERATED WRAPPER */
        .hud-container { 
            display: flex; flex-direction: column; height: 100vh; 
            padding: 15px; transform: translate3d(0,0,0);
            backface-visibility: hidden;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .brand { font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; }
        .brand span { color: var(--accent); }

        nav { display: flex; gap: 15px; }
        .nav-item { font-size: 10px; font-weight: 900; color: #444; transition: 0.1s; }
        .nav-item.active { color: var(--accent); }

        /* THE SMOOTH SCROLLER */
        .screen { 
            display: none; flex: 1; overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 15px 0 100px 0;
            will-change: scroll-position;
        }
        .screen.active { display: block; animation: fadeIn 0.2s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
        }
        
        .card { 
            background: #111; height: 130px; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transform: translate3d(0,0,0); /* Force GPU */
        }

        .card-img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7; 
            background: #181818;
        }

        .card-info { 
            position: absolute; bottom: 0; width: 100%; 
            padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .card-name { font-weight: 800; font-size: 11px; text-transform: uppercase; }

        /* UI ELEMENTS */
        .btn { 
            background: #000; color: var(--accent); border: 1px solid var(--accent); 
            padding: 15px; font-weight: 900; width: 100%; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { background: var(--accent); color: #000; transition: 0s; }

        input, select { 
            width: 100%; background: #111; border: 1px solid #222; 
            color: white; padding: 15px; font-size: 16px !important; 
            margin-bottom: 10px; border-radius: 0; outline: none;
        }

        /* MODAL */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2000; display: none; align-items: center; justify-content: center;
        }
        .overlay.active { display: flex; }
        .modal-sheet { background: #000; width: 85%; border: 1px solid var(--accent); padding: 25px; }

        .fab { 
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; 
            background: var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: black; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <header>
            <div class="brand">V-CORE // <span>OS</span></div>
            <nav>
                <div class="nav-item active" onclick="switchTab('garage', this)">GARAGE</div>
                <div class="nav-item" onclick="switchTab('network', this)">NET</div>
                <div class="nav-item" onclick="switchTab('data', this)">DATA</div>
            </nav>
        </header>

        <div id="screen-garage" class="screen active">
            <input type="text" id="searchInput" placeholder="SEARCH DATABASE..." oninput="render()">
            <div id="grid" class="grid"></div>
        </div>

        <div id="screen-network" class="screen">
            <button class="btn" onclick="addSector()">+ NEW GARAGE</button>
            <div id="netList" style="margin-top:20px;"></div>
        </div>

        <div id="screen-data" class="screen">
            <h2 id="stat-total" style="font-size:3rem; margin:0; color:var(--accent);">00</h2>
            <p style="font-size:10px; color:#444; margin-bottom:30px;">TOTAL ASSETS</p>
            
            <p style="font-size:10px; color:#aaa;">BULK DATA ENTRY</p>
            <div id="bulkList"></div>
            <button class="btn" onclick="addBulkRow()" style="margin:10px 0; border-color:#222; color:#555;">+ ROW</button>
            <button class="btn" onclick="processBulk()">INITIALIZE SYNC</button>
            
            <button class="btn" style="margin-top:40px; border-color:red; color:red;" onclick="nuke()">WIPE ALL DATA</button>
        </div>
    </div>

    <div class="overlay" id="addOverlay">
        <div class="modal-sheet">
            <h3 style="margin-top:0; font-style:italic;">NEW CAR</h3>
            <input type="text" id="vName" placeholder="MODEL NAME">
            <select id="vGarage"></select>
            <input type="file" id="vImg" accept="image/*">
            <button class="btn" onclick="saveVehicle()">CONFIRM</button>
            <p onclick="closeAdd()" style="text-align:center; font-size:10px; margin-top:15px; color:#555;">CANCEL</p>
        </div>
    </div>

    <div class="fab" onclick="openAdd()"><b>+</b></div>

    <script>
        let db = JSON.parse(localStorage.getItem('V_DB')) || [];
        let sectors = JSON.parse(localStorage.getItem('V_SEC')) || [];

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'data') { updateStats(); if(!document.getElementById('bulkList').children.length) addBulkRow(); }
            if(id === 'network') renderNet();
        }

        // Optimized Render (Batched DOM updates)
        function render() {
            const grid = document.getElementById('grid');
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = db.filter(v => v.name.toLowerCase().includes(q));
            
            let fragment = '';
            for(let i=0; i < filtered.length; i++) {
                fragment += `
                <div class="card">
                    <img src="${filtered[i].img || ''}" class="card-img" loading="lazy">
                    <div class="card-info"><div class="card-name">${filtered[i].name}</div></div>
                </div>`;
            }
            grid.innerHTML = fragment;
        }

        function openAdd() {
            if(!sectors.length) return alert("ADD GARAGE");
            document.getElementById('vGarage').innerHTML = sectors.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            document.getElementById('addOverlay').classList.add('active');
        }

        function closeAdd() { document.getElementById('addOverlay').classList.remove('active'); }

        // RESIZE IMAGE ON THE FLY (Crucial for Mobile Smoothness)
        function resizeImage(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Small size for fast mobile loading
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        res(canvas.toDataURL('image/jpeg', 0.7)); // High compression
                    }
                }
            });
        }

        async function saveVehicle() {
            const n = document.getElementById('vName').value.trim();
            const g = document.getElementById('vGarage').value;
            const f = document.getElementById('vImg').files[0];
            if(!n) return;
            
            let img = f ? await resizeImage(f) : '';
            db.push({ name: n, garage: g, img });
            
            saveSync();
            document.getElementById('vName').value = '';
            document.getElementById('vImg').value = '';
            closeAdd();
        }

        function addBulkRow() {
            const div = document.createElement('div');
            div.style.display = "flex"; div.style.gap = "5px"; div.style.marginBottom = "5px";
            div.innerHTML = `<input type="text" class="bn" placeholder="Name" style="margin:0;"><select class="bg" style="margin:0; width:80px;">${sectors.map(s=>`<option value="${s.name}">${s.id}</option>`).join('')}</select>`;
            document.getElementById('bulkList').appendChild(div);
        }

        function processBulk() {
            const names = document.querySelectorAll('.bn');
            const garages = document.querySelectorAll('.bg');
            names.forEach((n, i) => { if(n.value.trim()) db.push({ name: n.value.trim(), garage: garages[i].value, img: '' }); });
            saveSync();
            document.getElementById('bulkList').innerHTML = '';
            addBulkRow();
            switchTab('garage', document.querySelectorAll('.nav-item')[0]);
        }

        function renderNet() {
            document.getElementById('netList').innerHTML = sectors.map((s,i) => `
                <div style="padding:15px; background:#111; border:1px solid #222; margin-bottom:5px; display:flex; justify-content:space-between; font-size:12px;">
                    <span>${s.id} // ${s.name}</span>
                    <span onclick="delSec(${i})" style="color:red;">WIPE</span>
                </div>
            `).join('');
        }

        function addSector() {
            const n = prompt("Garage Name:").toUpperCase();
            const i = prompt("ID (e.g. S1):").toUpperCase();
            if(n && i) { sectors.push({name:n, id:i}); localStorage.setItem('V_SEC', JSON.stringify(sectors)); renderNet(); }
        }

        function delSec(i) { sectors.splice(i,1); localStorage.setItem('V_SEC', JSON.stringify(sectors)); renderNet(); }
        function saveSync() { localStorage.setItem('V_DB', JSON.stringify(db)); render(); updateStats(); }
        function updateStats() { document.getElementById('stat-total').innerText = db.length.toString().padStart(2, '0'); }
        function nuke() { if(confirm("WIPE SYSTEM?")) { localStorage.clear(); location.reload(); } }

        render();
    </script>
</body>
</html>
